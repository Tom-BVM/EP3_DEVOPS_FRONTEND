name: Deploy Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image
        run: |
          docker build -t ep3-frontend .
          docker tag ep3-frontend:latest 585541687273.dkr.ecr.us-east-1.amazonaws.com/ep3-frontend:latest
          docker push 585541687273.dkr.ecr.us-east-1.amazonaws.com/ep3-frontend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster ep3-cluster --service ep3-frontend-service --force-new-deployment
